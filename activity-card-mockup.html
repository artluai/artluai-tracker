<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>activity card — artlu.ai</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  /* ---------- theme tokens ---------- */
  html[data-theme="dark"] {
    --bg: #08090a;
    --surface: #0e0f11;
    --border: #1a1d22;
    --divider: #1a1d22;
    --text-bright: #f0f1f3;
    --text: #d0d2d7;
    --text-sub: #8a8f9a;
    --dim: #555b66;
    --green: #4ade80;
    --green-bg: rgba(74, 222, 128, 0.15);
    --cell-0: #1a1d22;
    --cell-1: #062b12;
    --cell-2: #0d5a29;
    --cell-3: #2a9d5a;
    --cell-4: #4ade80;
    --cell-future: #0e0f11;
    --tooltip-bg: #0e0f11;
    --tooltip-border: #2a2f36;
    --tooltip-shadow: 0 6px 24px rgba(0,0,0,0.5);
    --font-display: 'IBM Plex Mono', ui-monospace, monospace;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
    --card-radius: 4px;
    --card-padding: 14px 16px;
    --card-shadow: none;
  }
  html[data-theme="light"] {
    --bg: #f6f6f7;
    --surface: #ffffff;
    --border: #e3e3e3;
    --divider: #ebebeb;
    --text-bright: #1a1a1a;
    --text: #303030;
    --text-sub: #616161;
    --dim: #8a8a8a;
    --green: #008060;
    --green-bg: rgba(0, 128, 96, 0.12);
    --cell-0: #ebebeb;
    --cell-1: #cfece0;
    --cell-2: #8fd7ba;
    --cell-3: #3ea888;
    --cell-4: #008060;
    --cell-future: #f3f3f4;
    --tooltip-bg: #ffffff;
    --tooltip-border: #e3e3e3;
    --tooltip-shadow: 0 8px 24px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.03);
    --font-display: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
    --card-radius: 12px;
    --card-padding: 16px 18px;
    --card-shadow: 0 1px 0 rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.03);
  }

  body {
    font-family: var(--font-display);
    background: var(--bg);
    color: var(--text-bright);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    transition: background 0.2s;
  }

  /* ---------- theme toggle ---------- */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-sub);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 14px;
    transition: all 0.15s;
  }
  .theme-toggle:hover { color: var(--green); border-color: var(--green); }
  .theme-toggle svg { width: 14px; height: 14px; }
  html[data-theme="light"] .icon-sun { display: none; }
  html[data-theme="dark"] .icon-moon { display: none; }

  /* ---------- layout ---------- */
  .scene {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: flex-start;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-sub);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.02em;
  }
  .live-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 4px var(--green-bg);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 var(--green-bg); }
    70%  { box-shadow: 0 0 0 6px rgba(0,0,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
  }

  .wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    padding: var(--card-padding);
    display: flex;
    gap: 18px;
    align-items: stretch;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .stats {
    font-family: var(--font-mono);
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 8px;
    white-space: nowrap;
    padding-right: 18px;
    border-right: 1px solid var(--divider);
  }
  .row { display: flex; align-items: baseline; gap: 8px; font-size: 13px; }
  .key { color: var(--text-sub); font-weight: 400; }
  .val { color: var(--text-bright); font-weight: 600; }
  .heatmap-main { display: flex; flex-direction: column; }
  .heatmap-head {
    display: flex; align-items: baseline;
    font-family: var(--font-mono);
    font-size: 11px; color: var(--text-sub);
    margin-bottom: 8px;
  }
  .heatmap-head-text { color: var(--text-bright); font-weight: 500; }
  .streak-num { color: var(--green); font-weight: 600; }
  .streak-div { color: var(--text-sub); margin: 0 2px; }
  .grid-wrap { display: flex; gap: 6px; }
  .day-labels {
    display: grid; grid-template-rows: repeat(7, 12px); gap: 2px;
    padding-top: 18px; flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: 9px; color: var(--text-sub);
    line-height: 12px;
  }
  .months {
    display: flex; gap: 2px; margin-bottom: 4px;
    font-family: var(--font-mono);
    font-size: 9px; color: var(--text-sub);
    height: 12px; line-height: 12px;
  }
  .months span { width: 12px; flex-shrink: 0; }
  .heatmap-grid {
    display: grid;
    grid-template-rows: repeat(7, 12px);
    grid-auto-flow: column;
    grid-auto-columns: 12px;
    gap: 2px;
  }
  .heatmap-cell {
    width: 12px; height: 12px;
    background: var(--cell-0);
    border-radius: 2px;
    cursor: pointer;
    transition: transform 0.08s, outline-color 0.08s;
    outline: 1px solid transparent;
  }
  .heatmap-cell:hover { transform: scale(1.35); outline-color: var(--green); }
  .heatmap-cell.l1 { background: var(--cell-1); }
  .heatmap-cell.l2 { background: var(--cell-2); }
  .heatmap-cell.l3 { background: var(--cell-3); }
  .heatmap-cell.l4 { background: var(--cell-4); }
  .heatmap-cell.today { box-shadow: inset 0 0 0 1px var(--green); }
  .heatmap-cell.future { background: var(--cell-future); cursor: default; }
  .heatmap-cell.future:hover { transform: none; outline-color: transparent; }

  .legend {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono);
    font-size: 9px; color: var(--text-sub);
    margin-top: 10px;
    padding-left: 26px;
  }
  .legend-cells { display: flex; gap: 2px; }
  .legend-cell { width: 10px; height: 10px; border-radius: 2px; }
  .legend-hint { margin-left: 12px; color: var(--dim); }

  /* tooltip */
  .tooltip {
    position: fixed;
    z-index: 10;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-bright);
    pointer-events: none;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity 0.12s, transform 0.12s;
    box-shadow: var(--tooltip-shadow);
    max-width: 220px;
  }
  .tooltip.show { opacity: 1; transform: translateY(0); }
  .tooltip .t-date { color: var(--text-sub); margin-bottom: 5px; font-weight: 500; }
  .tooltip .t-head { color: var(--green); margin-bottom: 3px; font-weight: 500; }
  .tooltip .t-name { color: var(--text-bright); line-height: 1.5; }
  .tooltip .t-none { color: var(--dim); font-style: italic; }
</style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="scene">
    <div class="eyebrow">
      <span class="live-dot"></span>
      live — firestore onSnapshot · rolls over at local midnight
    </div>

    <div class="wrap">
      <div class="stats">
        <div class="row"><span class="key">day</span><span class="val" id="day-val">36 / 100</span></div>
        <div class="row"><span class="key">shipped</span><span class="val" id="shipped-val">24</span></div>
        <div class="row"><span class="key">to go</span><span class="val" id="togo-val">76</span></div>
        <div class="row"><span class="key">active</span><span class="val" id="active-val">21 days</span></div>
      </div>
      <div class="heatmap-main">
        <div class="heatmap-head">
          <span class="heatmap-head-text">
            streaks
            <span class="streak-num" id="cur-streak">3</span><span class="streak-div">/</span><span class="streak-num" id="best-streak">7</span>
          </span>
        </div>
        <div class="grid-wrap">
          <div class="day-labels">
            <span>Sun</span><span></span><span>Tue</span><span></span><span>Thu</span><span></span><span>Sat</span>
          </div>
          <div>
            <div class="months" id="months"></div>
            <div class="heatmap-grid" id="grid"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="legend">
      <span>less</span>
      <div class="legend-cells" id="legend-cells"></div>
      <span>more</span>
      <span class="legend-hint">hover any cell</span>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

<script>
  // ---------- theme toggle ----------
  const root = document.documentElement;
  const saved = localStorage.getItem("artlu-theme-mockup");
  if (saved === "dark" || saved === "light") root.setAttribute("data-theme", saved);
  document.getElementById("theme-toggle").addEventListener("click", () => {
    const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", next);
    localStorage.setItem("artlu-theme-mockup", next);
    renderLegend();
  });

  // ---------- heatmap data ----------
  const TOTAL_WEEKS = 14;
  const dayMs = 86400000;

  // Lock "today" so the mockup reads the same on every render.
  const today = new Date(2026, 3, 22);
  today.setHours(0,0,0,0);

  const end = new Date(today);
  end.setDate(today.getDate() + (6 - today.getDay()));
  const start = new Date(end);
  start.setDate(end.getDate() - (TOTAL_WEEKS * 7) + 1);

  function ymd(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function mulberry(seed) {
    return function() {
      seed = (seed + 0x6D2B79F5) | 0;
      let t = seed;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const rng = mulberry(1187);

  const samplePool = [
    "activity card heatmap",
    "dual theme (light/dark)",
    "showcase demos grid",
    "TRIBE traffic hub",
    "spoolcast",
    "chat-to-video",
    "pipelinecpc stripe",
    "xqboost sync",
    "vellumray",
    "reddit brand monitor",
    "animabot control panel",
    "VibeSkill mockup",
    "site snapshot tier 1",
    "permalink pages",
    "tag system",
    "drag-reorder table",
  ];

  const activity = {};
  for (let d = new Date(start); d <= today; d = new Date(d.getTime() + dayMs)) {
    const r = rng();
    if (r > 0.58) {
      const pct = rng();
      const count = pct > 0.93 ? 4 : pct > 0.82 ? 3 : pct > 0.62 ? 2 : 1;
      const picks = [];
      for (let i = 0; i < count; i++) {
        picks.push(samplePool[Math.floor(rng() * samplePool.length)]);
      }
      activity[ymd(d)] = Array.from(new Set(picks));
    }
  }
  const streakRecent = [
    ["chat-to-video"],
    ["TRIBE traffic hub"],
    ["spoolcast"],
    ["activity card heatmap", "dual theme (light/dark)"],
  ];
  for (let i = 3; i >= 0; i--) {
    const d = new Date(today.getTime() - i * dayMs);
    activity[ymd(d)] = streakRecent[3 - i];
  }

  // ---------- render ----------
  const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const grid = document.getElementById("grid");
  const monthsEl = document.getElementById("months");
  let lastMonth = -1;

  for (let w = 0; w < TOTAL_WEEKS; w++) {
    const weekStart = new Date(start);
    weekStart.setDate(start.getDate() + w * 7);
    const m = weekStart.getMonth();
    const label = document.createElement("span");
    label.textContent = m !== lastMonth ? monthNames[m] : "";
    monthsEl.appendChild(label);
    lastMonth = m;

    for (let d = 0; d < 7; d++) {
      const date = new Date(weekStart);
      date.setDate(weekStart.getDate() + d);
      const cell = document.createElement("div");
      cell.className = "heatmap-cell";
      const future = date > today;
      const key = ymd(date);
      const names = (!future && activity[key]) || [];
      const count = names.length;
      if (future) cell.classList.add("future");
      else if (count === 1) cell.classList.add("l1");
      else if (count === 2) cell.classList.add("l2");
      else if (count === 3) cell.classList.add("l3");
      else if (count >= 4) cell.classList.add("l4");
      if (date.getTime() === today.getTime()) cell.classList.add("today");

      cell.dataset.date = date.toDateString();
      cell.dataset.count = count;
      cell.dataset.future = future ? "1" : "0";
      cell.dataset.names = names.join("|");
      grid.appendChild(cell);
    }
  }

  // stats column from mock data
  let shipped = 0, active = 0;
  for (const k of Object.keys(activity)) {
    const n = activity[k].length;
    if (n > 0) active += 1;
    shipped += n;
  }
  shipped = Math.min(shipped, 24);
  document.getElementById("shipped-val").textContent = shipped;
  document.getElementById("togo-val").textContent = Math.max(0, 100 - shipped);
  document.getElementById("active-val").textContent = active + " " + (active === 1 ? "day" : "days");

  // streaks
  let best = 0, run = 0;
  for (let d = new Date(start); d <= today; d = new Date(d.getTime() + dayMs)) {
    if ((activity[ymd(d)] || []).length) { run += 1; if (run > best) best = run; }
    else run = 0;
  }
  let cur = 0;
  for (let d = new Date(today); d >= start; d = new Date(d.getTime() - dayMs)) {
    if ((activity[ymd(d)] || []).length) cur += 1; else break;
  }
  document.getElementById("cur-streak").textContent = cur;
  document.getElementById("best-streak").textContent = best;

  // legend pulls current theme colors so it matches after toggle
  function renderLegend() {
    const cs = getComputedStyle(root);
    const cells = ["--cell-0","--cell-1","--cell-2","--cell-3","--cell-4"]
      .map(v => cs.getPropertyValue(v).trim());
    const el = document.getElementById("legend-cells");
    el.innerHTML = cells
      .map(c => '<div class="legend-cell" style="background:' + c + '"></div>')
      .join("");
  }
  renderLegend();

  // ---------- tooltip ----------
  const tooltip = document.getElementById("tooltip");
  grid.addEventListener("mouseover", e => {
    const t = e.target;
    if (!t.classList || !t.classList.contains("heatmap-cell")) return;
    const { date, count, future, names } = t.dataset;
    let html = '<div class="t-date">' + date + '</div>';
    if (future === "1") {
      html += '<div class="t-none">future</div>';
    } else if (+count === 0) {
      html += '<div class="t-none">no activity</div>';
    } else {
      html += '<div class="t-head">' + count + ' project' + (+count === 1 ? "" : "s") + ' shipped</div>';
      names.split("|").forEach(n => {
        html += '<div class="t-name">• ' + n + '</div>';
      });
    }
    tooltip.innerHTML = html;
    tooltip.classList.add("show");
  });
  grid.addEventListener("mousemove", e => {
    const t = e.target;
    if (!t.classList || !t.classList.contains("heatmap-cell")) {
      tooltip.classList.remove("show");
      return;
    }
    const rect = tooltip.getBoundingClientRect();
    let x = e.clientX + 14;
    let y = e.clientY + 14;
    if (x + rect.width + 8 > window.innerWidth) x = e.clientX - rect.width - 14;
    if (y + rect.height + 8 > window.innerHeight) y = e.clientY - rect.height - 14;
    tooltip.style.left = x + "px";
    tooltip.style.top = y + "px";
  });
  grid.addEventListener("mouseout", () => {
    tooltip.classList.remove("show");
  });
</script>
</body>
</html>
